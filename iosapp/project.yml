name: TripWit
options:
  bundleIdPrefix: com.kevinbuckley.travelplanner
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.2"
packages:
  TripCore:
    path: Packages/TripCore
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    majorVersion: 8.0.0
  Supabase:
    url: https://github.com/supabase/supabase-swift
    majorVersion: 2.0.0
targets:
  TripWit:
    type: application
    platform: iOS
    sources:
      - TripWit
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: TripCore
      - target: TripWitWidget
        embed: true
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Supabase
        product: Supabase
    entitlements:
      path: TripWit/TripWit.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.kevinbuckley.travelplanner
        com.apple.security.application-groups:
          - group.com.kevinbuckley.travelplanner
        com.apple.developer.healthkit: YES
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbuckley.travelplanner
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: A6VYGLF4DB
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: "TripWit"
        INFOPLIST_FILE: TripWit/Info.plist
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "TripWit uses your location to quickly add stops near you and track your trip."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "TripWit matches your photos to trip stops based on location and time."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "TripWit can add your trip days to your calendar so you can see your itinerary alongside other events."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "TripWit reads your step count to show daily activity totals for each day of your trip."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "TripWit does not write health data."
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_NSSupportsLiveActivitiesFrequentUpdates: YES
        INFOPLIST_KEY_CFBundleShortVersionString: "1.3"
        MARKETING_VERSION: "1.3"
        CURRENT_PROJECT_VERSION: "96"
  TripWitWidget:
    type: app-extension
    platform: iOS
    sources:
      - TripWitWidget
    entitlements:
      path: TripWitWidget/TripWitWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kevinbuckley.travelplanner
    info:
      path: TripWitWidget/Info.plist
      properties:
        CFBundleDisplayName: TripWit
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbuckley.travelplanner.widget
        INFOPLIST_FILE: TripWitWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "TripWit"
        DEVELOPMENT_TEAM: A6VYGLF4DB
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
        CURRENT_PROJECT_VERSION: "96"
        MARKETING_VERSION: "1.3"
  TripWitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TripWitTests
    dependencies:
      - target: TripWit
      - package: TripCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinbuckley.travelplanner.tests
        GENERATE_INFOPLIST_FILE: YES
